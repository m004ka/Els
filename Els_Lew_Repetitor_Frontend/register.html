<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация — RepEdu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-[#FFF9F0] min-h-screen flex flex-col">

<nav class="w-full bg-white/90 backdrop-blur border-b border-orange-100 shadow-sm px-6 py-3 flex items-center">
  <a href="index.html" class="text-2xl font-extrabold gradient-text">RepEdu</a>
</nav>

<div class="flex-1 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-lg">
    <div class="card shadow-xl">
      <h1 class="text-2xl font-extrabold text-gray-900 mb-1">Создать аккаунт</h1>
      <p class="text-gray-400 text-sm mb-6">Присоединяйтесь к RepEdu</p>

      <!-- Role selector -->
      <div class="flex gap-3 mb-6">
        <button type="button" id="role-student" onclick="setRole('STUDENT')"
          class="tab-btn active flex-1 py-3 text-center border border-orange-200 rounded-xl">
          🎓 Я ученик
        </button>
        <button type="button" id="role-tutor" onclick="setRole('TUTOR')"
          class="tab-btn flex-1 py-3 text-center border border-orange-200 rounded-xl">
          👨‍🏫 Я репетитор
        </button>
      </div>

      <form id="register-form" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Имя</label>
            <input type="text" id="firstName" required class="input-field" placeholder="Иван"/>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Фамилия</label>
            <input type="text" id="lastName" required class="input-field" placeholder="Иванов"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Имя пользователя</label>
          <input type="text" id="username" required class="input-field" placeholder="ivan_ivanov"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
          <input type="email" id="email" required class="input-field" placeholder="you@example.com"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Пароль</label>
          <input type="password" id="password" required minlength="6" class="input-field" placeholder="Минимум 6 символов"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Город</label>
          <select id="cityId" class="input-field">
            <option value="">Выберите город</option>
          </select>
        </div>
        <div id="error-msg" class="hidden text-red-500 text-sm bg-red-50 p-3 rounded-xl"></div>
        <button type="submit" class="btn-primary w-full text-base">Зарегистрироваться</button>
      </form>

      <p class="text-center text-sm text-gray-400 mt-6">
        Уже есть аккаунт? <a href="login.html" class="text-orange-500 font-semibold hover:underline">Войти</a>
      </p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  let selectedRole = 'STUDENT';

  const params = new URLSearchParams(window.location.search);
  if (params.get('role') === 'TUTOR') setRole('TUTOR');

  function setRole(role) {
    selectedRole = role;
    document.getElementById('role-student').classList.toggle('active', role === 'STUDENT');
    document.getElementById('role-tutor').classList.toggle('active', role === 'TUTOR');
  }

  api.cities.getAll().then(cities => {
    const sel = document.getElementById('cityId');
    cities.forEach(c => {
      sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    });
  });

  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');
    const cityId = document.getElementById('cityId').value;
    try {
      const data = await api.auth.register({
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        username: document.getElementById('username').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: selectedRole,
        cityId: cityId ? parseInt(cityId) : null
      });
      setAuth(data);
      window.location.href = data.role === 'TUTOR' ? 'tutor-cabinet.html' : 'student-cabinet.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
