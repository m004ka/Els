<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Кабинет репетитора — RepEdu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css'/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="bg-[#FFF9F0] min-h-screen">

<nav class="fixed w-full top-0 z-50 bg-white/90 backdrop-blur border-b border-orange-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
    <a href="index.html" class="text-2xl font-extrabold gradient-text">RepEdu</a>
    <div id="nav-auth" class="flex items-center gap-3"></div>
  </div>
</nav>

<div class="pt-24 pb-16 px-6 max-w-7xl mx-auto">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-extrabold text-gray-900" id="welcome-text">Кабинет репетитора</h1>
      <p class="text-gray-400">Управляйте своим расписанием и профилем</p>
    </div>
  </div>

  <!-- TABS -->
  <div class="flex flex-wrap gap-2 mb-8 bg-white rounded-2xl p-2 border border-orange-100 w-fit">
    <button class="tab-btn active" onclick="showTab('schedule')">📅 Расписание</button>
    <button class="tab-btn" onclick="showTab('bookings')">👥 Записи</button>
    <button class="tab-btn" onclick="showTab('profile')">✏️ Профиль</button>
    <button class="tab-btn" onclick="showTab('materials')">📚 Материалы</button>
    <button class="tab-btn" onclick="showTab('messages')">💬 Сообщения</button>
    <button class="tab-btn" onclick="showTab('stats')">📊 Статистика</button>
  </div>

  <!-- SCHEDULE (FullCalendar) -->
  <div id="tab-schedule" class="tab-content">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold text-gray-800">Моё расписание</h2>
      <button onclick="showAddSlot()" class="btn-primary text-sm px-5 py-2.5">+ Добавить слот</button>
    </div>

    <!-- Add slot form -->
    <div id="add-slot-form" class="hidden card mb-6 max-w-lg">
      <h3 class="font-bold mb-3">Новый слот</h3>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">Начало</label>
          <input type="datetime-local" id="slot-start" class="input-field"/>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">Конец</label>
          <input type="datetime-local" id="slot-end" class="input-field"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="text-sm font-semibold text-gray-700 mb-1 block">Цена (₽/час, опционально)</label>
        <input type="number" id="slot-price" class="input-field" placeholder="Оставьте пустым для использования стандартной цены"/>
      </div>
      <div id="slot-error" class="hidden text-red-500 text-sm mb-2"></div>
      <div class="flex gap-2">
        <button onclick="addSlot()" class="btn-primary">Добавить</button>
        <button onclick="document.getElementById('add-slot-form').classList.add('hidden')" class="btn-secondary">Отмена</button>
      </div>
    </div>

    <div class="card">
      <div id="calendar"></div>
    </div>
  </div>

  <!-- BOOKINGS -->
  <div id="tab-bookings" class="tab-content hidden">
    <h2 class="text-xl font-bold text-gray-800 mb-4">Записи учеников</h2>
    <div id="bookings-list" class="space-y-4"></div>
  </div>

  <!-- PROFILE -->
  <div id="tab-profile" class="tab-content hidden">
    <h2 class="text-xl font-bold text-gray-800 mb-4">Мой профиль</h2>
    <div class="grid md:grid-cols-2 gap-6">
      <div class="card space-y-4">
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">О себе</label>
          <textarea id="p-bio" class="input-field" rows="4" placeholder="Расскажите о своём опыте..."></textarea>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">Фото (URL)</label>
          <input type="url" id="p-photo" class="input-field" placeholder="https://..."/>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">Цена за час (₽)</label>
          <input type="number" id="p-price" class="input-field" placeholder="1500"/>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">Город</label>
          <select id="p-city" class="input-field"></select>
        </div>
      </div>
      <div class="card space-y-4">
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">Telegram</label>
          <input type="text" id="p-telegram" class="input-field" placeholder="@username"/>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">ВКонтакте</label>
          <input type="url" id="p-vk" class="input-field" placeholder="https://vk.com/..."/>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-1 block">Телефон</label>
          <input type="tel" id="p-phone" class="input-field" placeholder="+7..."/>
        </div>
        <div>
          <label class="text-sm font-semibold text-gray-700 mb-2 block">Предметы</label>
          <div id="p-subjects" class="flex flex-wrap gap-2 max-h-48 overflow-y-auto"></div>
        </div>
      </div>
    </div>
    <button onclick="saveProfile()" class="btn-primary mt-4 px-8">Сохранить</button>
  </div>

  <!-- MATERIALS -->
  <div id="tab-materials" class="tab-content hidden">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold text-gray-800">Материалы</h2>
      <button onclick="document.getElementById('add-material-form').classList.toggle('hidden')" class="btn-primary text-sm px-4 py-2">+ Добавить</button>
    </div>
    <div id="add-material-form" class="hidden card mb-6 max-w-lg">
      <h3 class="font-bold mb-3">Новый материал</h3>
      <input type="text" id="m-title" class="input-field mb-3" placeholder="Название"/>
      <textarea id="m-desc" class="input-field mb-3" rows="2" placeholder="Описание"></textarea>
      <input type="url" id="m-url" class="input-field mb-3" placeholder="Ссылка на файл"/>
      <select id="m-subject" class="input-field mb-3">
        <option value="">Без предмета</option>
      </select>
      <input type="number" id="m-student" class="input-field mb-3" placeholder="ID студента (опционально)"/>
      <button onclick="addMaterial()" class="btn-primary">Добавить</button>
    </div>
    <div id="materials-list" class="grid md:grid-cols-2 gap-4"></div>
  </div>

  <!-- MESSAGES -->
  <div id="tab-messages" class="tab-content hidden">
    <h2 class="text-xl font-bold text-gray-800 mb-4">Сообщения</h2>
    <div class="grid md:grid-cols-3 gap-4">
      <div id="contacts-list" class="space-y-2"><p class="text-gray-400 text-sm">Нет переписок</p></div>
      <div class="md:col-span-2" id="chat-area">
        <div class="card h-96 flex items-center justify-center text-gray-400">Выберите переписку</div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div id="tab-stats" class="tab-content hidden">
    <h2 class="text-xl font-bold text-gray-800 mb-6">Моя статистика</h2>
    <div id="stats-content" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    <div id="reviews-stats" class="mt-8 card max-w-2xl"></div>
  </div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
<script src="js/api.js"></script>
<script>
  if (!requireAuth('TUTOR')) {}

  const user = getUser();
  if (user) document.getElementById('welcome-text').textContent = `Привет, ${user.firstName}!`;
  renderNavAuth();

  let calendar;
  let allSlots = [];

  function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.remove('hidden');
    event.target.classList.add('active');
    if (tab === 'schedule') initCalendar();
    if (tab === 'bookings') loadBookings();
    if (tab === 'profile') loadProfile();
    if (tab === 'materials') loadMaterials();
    if (tab === 'messages') loadMessages();
    if (tab === 'stats') loadStats();
  }

  // CALENDAR
  function initCalendar() {
    if (calendar) { calendar.render(); return; }
    const el = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(el, {
      initialView: 'timeGridWeek',
      locale: 'ru',
      headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
      height: 600,
      events: loadCalendarEvents,
      eventClick: function(info) {
        const slotId = parseInt(info.event.id);
        if (info.event.extendedProps.status === 'FREE') {
          if (confirm('Удалить этот слот?')) deleteSlot(slotId);
        }
      }
    });
    calendar.render();
  }

  function loadCalendarEvents(fetchInfo, successCallback) {
    api.tutors.getMySlots().then(slots => {
      allSlots = slots;
      const events = slots.map(s => ({
        id: s.id,
        title: s.status === 'FREE' ? `Свободно (${s.price ? s.price + '₽' : 'цена не указана'})` : s.status === 'BOOKED' ? 'Занято' : 'Отменено',
        start: s.startTime,
        end: s.endTime,
        className: `fc-event-${s.status.toLowerCase()}`,
        extendedProps: { status: s.status }
      }));
      successCallback(events);
    });
  }

  function showAddSlot() {
    document.getElementById('add-slot-form').classList.toggle('hidden');
  }

  async function addSlot() {
    const start = document.getElementById('slot-start').value;
    const end = document.getElementById('slot-end').value;
    const price = document.getElementById('slot-price').value;
    const errEl = document.getElementById('slot-error');
    errEl.classList.add('hidden');
    if (!start || !end) { errEl.textContent = 'Укажите время'; errEl.classList.remove('hidden'); return; }
    try {
      await api.tutors.addSlot({ startTime: start + ':00', endTime: end + ':00', price: price ? parseFloat(price) : null });
      showToast('Слот добавлен!');
      document.getElementById('add-slot-form').classList.add('hidden');
      if (calendar) calendar.refetchEvents();
    } catch (err) { errEl.textContent = err.message; errEl.classList.remove('hidden'); }
  }

  async function deleteSlot(id) {
    try { await api.tutors.deleteSlot(id); showToast('Слот удалён'); if (calendar) calendar.refetchEvents(); }
    catch (err) { showToast(err.message, 'error'); }
  }

  // BOOKINGS
  function loadBookings() {
    api.tutors.getMyBookings().then(bookings => {
      const el = document.getElementById('bookings-list');
      if (!bookings.length) { el.innerHTML = '<div class="card text-center text-gray-400">Нет записей</div>'; return; }
      const statusMap = { PENDING: 'badge-yellow', CONFIRMED: 'badge-green', CANCELLED: 'badge-red', COMPLETED: 'badge-blue' };
      const statusRu = { PENDING: 'Ожидает', CONFIRMED: 'Подтверждено', CANCELLED: 'Отменено', COMPLETED: 'Завершено' };
      el.innerHTML = bookings.map(b => `
        <div class="card flex items-center justify-between gap-4">
          <div>
            <div class="font-bold text-gray-900">${b.studentFirstName} ${b.studentLastName}</div>
            <div class="text-sm text-gray-500">${b.subjectName || 'Без предмета'} · ${formatDate(b.slotStart)}</div>
          </div>
          <div class="flex items-center gap-3">
            <span class="badge ${statusMap[b.status]}">${statusRu[b.status]}</span>
            ${b.status === 'CONFIRMED' ? `
              <button onclick="completeBooking(${b.id})" class="text-sm btn-primary px-3 py-1.5">Завершить</button>
              <button onclick="writeMsg(${b.studentId})" class="text-sm btn-secondary px-3 py-1.5">Написать</button>
            ` : ''}
          </div>
        </div>
      `).join('');
    });
  }

  async function completeBooking(id) {
    try { await api.tutors.completeBooking(id); showToast('Урок завершён!'); loadBookings(); }
    catch (err) { showToast(err.message, 'error'); }
  }

  function writeMsg(userId) {
    showTab('messages');
    document.querySelectorAll('.tab-btn')[4].classList.add('active');
    setTimeout(() => loadChat(userId), 300);
  }

  // PROFILE
  function loadProfile() {
    api.tutors.getMyProfile().then(p => {
      document.getElementById('p-bio').value = p.bio || '';
      document.getElementById('p-photo').value = p.photoUrl || '';
      document.getElementById('p-price').value = p.pricePerHour || '';
      document.getElementById('p-telegram').value = p.telegramContact || '';
      document.getElementById('p-vk').value = p.vkContact || '';
      document.getElementById('p-phone').value = p.phoneContact || '';

      api.cities.getAll().then(cities => {
        const sel = document.getElementById('p-city');
        sel.innerHTML = '<option value="">Не выбран</option>';
        cities.forEach(c => sel.innerHTML += `<option value="${c.id}" ${p.cityName === c.name ? 'selected' : ''}>${c.name}</option>`);
      });

      api.subjects.getAll().then(subjects => {
        const el = document.getElementById('p-subjects');
        el.innerHTML = subjects.map(s => `
          <label class="flex items-center gap-1 cursor-pointer">
            <input type="checkbox" class="subject-check accent-orange-500" value="${s.id}" ${p.subjects.includes(s.name) ? 'checked' : ''}/>
            <span class="text-sm">${s.name}</span>
          </label>
        `).join('');
      });
    });
  }

  async function saveProfile() {
    const subjectIds = Array.from(document.querySelectorAll('.subject-check:checked')).map(el => parseInt(el.value));
    try {
      await api.tutors.updateProfile({
        bio: document.getElementById('p-bio').value,
        photoUrl: document.getElementById('p-photo').value || null,
        pricePerHour: parseFloat(document.getElementById('p-price').value) || null,
        telegramContact: document.getElementById('p-telegram').value || null,
        vkContact: document.getElementById('p-vk').value || null,
        phoneContact: document.getElementById('p-phone').value || null,
        cityId: document.getElementById('p-city').value ? parseInt(document.getElementById('p-city').value) : null,
        subjectIds
      });
      showToast('Профиль сохранён!');
    } catch (err) { showToast(err.message, 'error'); }
  }

  // MATERIALS
  function loadMaterials() {
    api.materials.getTutor().then(items => {
      const el = document.getElementById('materials-list');
      if (!items.length) { el.innerHTML = '<div class="col-span-2 card text-center text-gray-400">Нет материалов</div>'; return; }
      el.innerHTML = items.map(m => `
        <div class="card">
          <div class="font-bold text-gray-900 mb-1">${m.title}</div>
          <div class="text-xs badge badge-blue mb-2">${m.subjectName || 'Без предмета'}</div>
          ${m.description ? `<p class="text-sm text-gray-500">${m.description}</p>` : ''}
          ${m.fileUrl ? `<a href="${m.fileUrl}" target="_blank" class="text-orange-500 text-sm underline">📎 Файл</a>` : ''}
        </div>
      `).join('');
    });
    api.subjects.getAll().then(subjects => {
      const sel = document.getElementById('m-subject');
      sel.innerHTML = '<option value="">Без предмета</option>';
      subjects.forEach(s => sel.innerHTML += `<option value="${s.id}">${s.name}</option>`);
    });
  }

  async function addMaterial() {
    const title = document.getElementById('m-title').value;
    if (!title) { showToast('Введите название', 'error'); return; }
    const sId = document.getElementById('m-student').value;
    try {
      await api.materials.create({
        title,
        description: document.getElementById('m-desc').value,
        fileUrl: document.getElementById('m-url').value || null,
        subjectId: document.getElementById('m-subject').value ? parseInt(document.getElementById('m-subject').value) : null,
        studentId: sId ? parseInt(sId) : null
      });
      showToast('Материал добавлен!');
      document.getElementById('add-material-form').classList.add('hidden');
      loadMaterials();
    } catch (err) { showToast(err.message, 'error'); }
  }

  // MESSAGES
  let activeContactId = null;
  function loadMessages() {
    api.messages.getContacts().then(async contactIds => {
      if (!contactIds.length) return;
      const el = document.getElementById('contacts-list');
      el.innerHTML = '';
      for (const id of contactIds) {
        el.innerHTML += `<button onclick="loadChat(${id})" class="w-full text-left card py-3 px-4 hover:border-orange-400 transition text-sm font-medium">Пользователь #${id}</button>`;
      }
    });
  }

  function loadChat(userId) {
    activeContactId = userId;
    api.messages.getConversation(userId).then(messages => {
      const me = getUser();
      document.getElementById('chat-area').innerHTML = `
        <div class="card flex flex-col h-96">
          <div class="flex-1 overflow-y-auto space-y-3 mb-4" id="chat-messages">
            ${messages.map(m => `
              <div class="flex ${m.senderId === me.id ? 'justify-end' : 'justify-start'}">
                <div class="max-w-xs px-4 py-2 rounded-2xl text-sm ${m.senderId === me.id ? 'gradient-btn text-white' : 'bg-gray-100 text-gray-800'}">
                  ${m.content}
                  <div class="text-xs opacity-60 mt-1">${formatDate(m.createdAt)}</div>
                </div>
              </div>
            `).join('') || '<p class="text-center text-gray-400 text-sm">Нет сообщений</p>'}
          </div>
          <div class="flex gap-2">
            <input type="text" id="msg-input" class="input-field flex-1" placeholder="Написать сообщение..."/>
            <button onclick="sendMsg()" class="btn-primary px-4">→</button>
          </div>
        </div>
      `;
      const chatEl = document.getElementById('chat-messages');
      if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;
    });
  }

  async function sendMsg() {
    const input = document.getElementById('msg-input');
    if (!input || !input.value.trim() || !activeContactId) return;
    try {
      await api.messages.send({ receiverId: activeContactId, content: input.value.trim() });
      input.value = '';
      loadChat(activeContactId);
    } catch (err) { showToast(err.message, 'error'); }
  }

  // STATS
  function loadStats() {
    api.tutors.getMyProfile().then(p => {
      document.getElementById('stats-content').innerHTML = `
        <div class="card text-center"><div class="text-3xl font-extrabold gradient-text">${p.totalLessons}</div><div class="text-gray-500 text-sm mt-1">Уроков проведено</div></div>
        <div class="card text-center"><div class="text-3xl font-extrabold gradient-text">${p.totalReviews}</div><div class="text-gray-500 text-sm mt-1">Отзывов</div></div>
        <div class="card text-center"><div class="text-3xl font-extrabold gradient-text">${p.rating.toFixed(1)}</div><div class="text-gray-500 text-sm mt-1">Средний рейтинг</div></div>
        <div class="card text-center"><div class="text-3xl font-extrabold gradient-text">${p.pricePerHour ? p.pricePerHour + '₽' : '—'}</div><div class="text-gray-500 text-sm mt-1">Цена за час</div></div>
      `;
    });
    api.reviews.getByTutor(null).catch(() => {}).then(() => {
      api.tutors.getMyProfile().then(async p => {
        const reviews = await api.reviews.getByTutor(p.id);
        if (!reviews.length) return;
        const counts = [5,4,3,2,1].map(s => ({ star: s, count: reviews.filter(r => Math.round(r.rating) === s).length }));
        document.getElementById('reviews-stats').innerHTML = `
          <h3 class="font-bold text-gray-800 mb-4">Распределение оценок</h3>
          ${counts.map(c => `
            <div class="flex items-center gap-3 mb-2">
              <span class="text-sm font-semibold w-4">${c.star}★</span>
              <div class="rating-bar flex-1"><div class="rating-bar-fill" style="width:${reviews.length ? (c.count/reviews.length*100) : 0}%"></div></div>
              <span class="text-sm text-gray-500 w-6 text-right">${c.count}</span>
            </div>
          `).join('')}
        `;
      });
    });
  }

  // Init
  initCalendar();
</script>
</body>
</html>
