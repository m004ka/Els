version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: repedu-postgres
    environment:
      POSTGRES_DB: repedu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Els_Lew_Repetitor
      dockerfile: Dockerfile
    container_name: repedu-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/repedu
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: admin
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./Els_Lew_Repetitor_Frontend
      dockerfile: Dockerfile
    container_name: repedu-frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres-data:
